<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3  M W//U</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- หน้าล็อก -->
  <div id="lock-screen">
    <div class="lock-card">
      <span class="lock-icon">🔒</span>
      <h1>Kaofang Area</h1>
<p>กรุณาใส่วันครบรอบพร้อมเครื่องหมายทับ xx/xx/xxxx</p>
      <div class="input-wrap">
        <input
          type="password"
          id="password-input"
          placeholder="ใส่รหัสผ่าน"
          autocomplete="current-password"
        />
        <button id="toggle-vis" type="button">👁</button>
      </div>

      <button id="unlock-btn" type="button">มั่นใจแล้วกดเบยยย</button>

      <div id="error-msg"></div>
      <div id="attempts-left"></div>
    </div>
  </div>

  <!-- เนื้อหาเว็บจริง -->
  <div id="main-content">
    <h2>ไอหย่าจำได้ด้วยเก่งจัง💖</h2>
    <p>เอาล่ะพร้อมมั้ยเตรียมใจนะครับ</p>
    <span class="badge">✓เก่งมาก</span>
      <br><br>
  <a href="1.html" id="go-btn">พร้อมแล้วไปกันเลย →</a>
  </div>

  <script src="script.js"></script>
</body>
</html>
